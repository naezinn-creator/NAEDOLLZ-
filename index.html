<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NAEDOLLZ Mobile</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

/* =========================
RESET MOBILE FIRST
========================= */

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Inter;
background:#f5efea;
color:#4a0f14;
overflow-x:hidden;
}

/* fond */
body:before{
content:"";
position:fixed;
inset:0;
background:url("https://i.goopics.net/wir21c.png") center/cover no-repeat;
opacity:.35;
z-index:-1;
}

/* =========================
HEADER MOBILE
========================= */

header{
position:fixed;
top:10px;
left:50%;
transform:translateX(-50%);
width:95%;
display:flex;
justify-content:space-between;
gap:5px;
padding:10px;
background:rgba(255,255,255,.6);
backdrop-filter:blur(12px);
border-radius:18px;
z-index:1000;
}

header button{
flex:1;
font-size:10px;
text-transform:uppercase;
border:none;
background:none;
color:#4a0f14;
}

/* =========================
PAGES
========================= */

.page{
display:none;
padding:90px 10px 40px;
}

.page.active{
display:block;
}

/* =========================
HERO
========================= */

.hero{
text-align:center;
padding-top:120px;
}

.hero h1{
font-family:"Cormorant Garamond";
font-size:48px;
letter-spacing:6px;
}

.hero p{
font-size:10px;
text-transform:uppercase;
opacity:.7;
margin-top:10px;
}

.hero button{
margin-top:20px;
padding:10px 14px;
border:1px solid #4a0f14;
background:transparent;
}

/* =========================
ACCORDÉON
========================= */

.acc-item{
background:rgba(255,255,255,.65);
margin-bottom:10px;
border-radius:14px;
overflow:hidden;
}

.acc-title{
width:100%;
padding:14px;
border:none;
background:none;
text-align:left;
text-transform:uppercase;
font-size:11px;
}

.acc-content{
max-height:0;
overflow:hidden;
transition:.4s ease;
padding:0 14px;
}

.acc-item.active .acc-content{
max-height:800px;
padding:14px;
}

/* =========================
CABINE MOBILE ULTRA SIMPLE
========================= */

#cabine{
padding-top:90px;
}

#avatar-box{
width:100%;
height:65vh;
border:3px solid #4a0f14;
border-radius:18px;
overflow:hidden;
position:relative;
background:#f5efea;
}

#avatar-box img{
width:100%;
height:100%;
object-fit:contain;
position:absolute;
top:0;
left:0;
}

/* flèches cabine mobile */
.mobile-nav{
display:flex;
justify-content:center;
gap:20px;
margin-top:10px;
}

.mobile-nav button{
padding:10px 14px;
border:1px solid #4a0f14;
background:white;
}

/* panneau produit */
#product-panel{
margin-top:10px;
background:rgba(255,255,255,.7);
padding:10px;
border-radius:12px;
}

/* menu catégories simplifié */
.category{
display:flex;
justify-content:space-between;
align-items:center;
padding:8px 0;
border-bottom:1px solid rgba(0,0,0,.1);
}

.category button{
padding:4px 6px;
font-size:12px;
}

/* =========================
PANIER
========================= */

#cart{
background:rgba(255,255,255,.7);
padding:15px;
border-radius:14px;
}

.cart-item{
padding:10px 0;
border-bottom:1px solid #ddd;
}

</style>
</head>

<body>

<header>
<button onclick="showPage('home')">Home</button>
<button onclick="showPage('magazine')">Mag</button>
<button onclick="showPage('cabine')">Cab</button>
<button onclick="showPage('panier')">Panier</button>
</header>

<!-- HOME -->
<section id="home" class="page active">
<div class="hero">
<h1>NAEDOLLZ</h1>
<p>mobile experience</p>
<button onclick="showPage('cabine')">Enter</button>
</div>
</section>

<!-- MAGAZINE -->
<section id="magazine" class="page">

<div class="acc-item">
<button class="acc-title">Editorial</button>
<div class="acc-content">
<p>Version mobile simplifiée du magazine.</p>
</div>
</div>

</section>

<!-- CABINE -->
<section id="cabine" class="page">

<div id="avatar-box">
<img id="base-avatar">
</div>

<div class="mobile-nav">
<button onclick="moveLayer(-1)">❮</button>
<button onclick="moveLayer(1)">❯</button>
</div>

<div id="product-panel">
<h3 id="product-name"></h3>
<p id="product-desc"></p>
<p id="product-price"></p>
<button onclick="addToCart()">Ajouter</button>
</div>

<div id="menus"></div>

</section>

<!-- PANIER -->
<section id="panier" class="page">

<div id="cart">
<h2>Panier</h2>
<div id="cart-items"></div>
<button id="validate-cart">Valider</button>
</div>

</section>

<script>

/* NAV */
function showPage(id){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

/* ACCORDION */
document.querySelectorAll(".acc-title").forEach(b=>{
b.onclick=()=>b.parentElement.classList.toggle("active");
});

/* CABINE MINI LOGIC */

let currentIndex = 0;
let items = [
"https://i.goopics.net/yqfh46.png",
"https://i.goopics.net/xo6433.png"
];

function render(){
document.getElementById("base-avatar").src = items[currentIndex];
}

function moveLayer(dir){
currentIndex += dir;
if(currentIndex < 0) currentIndex = items.length-1;
if(currentIndex >= items.length) currentIndex = 0;
render();
}

render();

/* CART SIMPLE */
let cart=[];
function addToCart(){
cart.push({name:"item"});
alert("Ajouté");
}

document.getElementById("validate-cart").onclick=function(){
alert("Commande envoyée");
cart=[];
};

</script>

</body>
</html>
