<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NAEDOLLZ</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

/* ======================
   RESET
====================== */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Inter', sans-serif;
  background:#f5efea;
  color:#4a0f14;
  overflow-x:hidden;
  -webkit-tap-highlight-color: transparent;
}

/* ======================
   BACKGROUND
====================== */
body:before{
  content:"";
  position:fixed;
  inset:0;
  background:url("https://i.goopics.net/wir21c.png") center/cover no-repeat;
  opacity:.45;
  z-index:-1;
}

/* ======================
   APP PAGES
====================== */
.page{
  display:none;
  min-height:100vh;
  padding:90px 16px 120px;
}

.page.active{
  display:block;
  animation:fade .35s ease;
}

@keyframes fade{
  from{opacity:0; transform:translateY(10px);}
  to{opacity:1; transform:translateY(0);}
}

/* ======================
   TOP HEADER (clean iOS)
====================== */
header{
  position:fixed;
  top:12px;
  left:50%;
  transform:translateX(-50%);
  width:92%;
  background:rgba(255,255,255,.55);
  backdrop-filter:blur(18px);
  border-radius:24px;
  display:flex;
  justify-content:center;
  gap:14px;
  padding:10px;
  z-index:1000;
}

header button{
  border:none;
  background:none;
  font-size:11px;
  letter-spacing:1px;
  text-transform:uppercase;
  color:#4a0f14;
}

/* ======================
   HOME
====================== */
.hero{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}

.hero h1{
  font-family:'Cormorant Garamond', serif;
  font-size:clamp(50px,10vw,120px);
  letter-spacing:8px;
}

.hero p{
  font-size:12px;
  opacity:.7;
  margin-top:10px;
  text-align:center;
}

.hero-btn{
  margin-top:20px;
  padding:10px 14px;
  border:1px solid #4a0f14;
  background:transparent;
}

/* ======================
   MAGAZINE
====================== */
.magazine-container{
  max-width:600px;
  margin:auto;
}

.acc-item{
  background:rgba(255,255,255,.6);
  margin-bottom:12px;
  border-radius:16px;
  overflow:hidden;
  border:1px solid rgba(255,255,255,.6);
}

.acc-title{
  width:100%;
  padding:16px;
  border:none;
  background:none;
  text-align:left;
  text-transform:uppercase;
  font-size:12px;
}

.acc-content{
  max-height:0;
  overflow:hidden;
  transition:.4s ease;
  padding:0 16px;
}

.acc-item.active .acc-content{
  padding:16px;
  max-height:500px;
}

/* ======================
   SHOWCASE
====================== */
.showcase-container{
  width:100%;
  max-width:340px;
  aspect-ratio:3/4;
  margin:auto;
  position:relative;
  border-radius:20px;
  overflow:hidden;
  border:4px solid #4a0f14;
  background:#f7efe8;
}

.showcase-slide{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:contain;
  opacity:0;
  transition:opacity .6s;
}

/* ======================
   CABINE (MOBILE FIRST)
====================== */
#cabine-layout{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:14px;
}

#avatar-box{
  width:92vw;
  max-width:360px;
  aspect-ratio:3/5;
  border:4px solid #4a0f14;
  border-radius:20px;
  background:#f5efea;
  position:relative;
}

#avatar-box img{
  width:100%;
  height:100%;
  object-fit:contain;
  position:absolute;
}

#menu-box{
  width:92vw;
  max-width:360px;
}

/* ======================
   PANIER
====================== */
#cart{
  width:92vw;
  max-width:500px;
  margin:auto;
  background:rgba(255,255,255,.6);
  border-radius:16px;
  padding:16px;
}

/* ======================
   TAB BAR iOS
====================== */
#tabbar{
  position:fixed;
  bottom:14px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:10px;
  padding:10px 12px;
  background:rgba(255,255,255,.6);
  backdrop-filter:blur(20px);
  border-radius:22px;
  border:1px solid rgba(255,255,255,.7);
  z-index:9999;
}

#tabbar button{
  border:none;
  background:none;
  font-size:11px;
  text-transform:uppercase;
}

</style>
</head>

<body>

<header>
  <button onclick="showPage('home')">Home</button>
  <button onclick="showPage('magazine')">Edito</button>
  <button onclick="showPage('cabine')">Studio</button>
  <button onclick="showPage('panier')">Panier</button>
</header>

<!-- HOME -->
<section id="home" class="page active">
  <div class="hero">
    <h1>NAEDOLLZ</h1>
    <p>Studio beauté · fashion · avatars</p>
    <button class="hero-btn" onclick="showPage('magazine')">
      Explorer
    </button>
  </div>
</section>

<!-- MAGAZINE -->
<section id="magazine" class="page">
<div class="magazine-container">

<div class="acc-item">
<button class="acc-title">Editorial</button>
<div class="acc-content">
<p>Bienvenue dans NAEDOLLZ.</p>
</div>
</div>

<div class="acc-item">
<button class="acc-title">Showroom</button>
<div class="acc-content">

<div class="showcase-container">
<img class="showcase-slide" id="s1">
<img class="showcase-slide" id="s2">
</div>

</div>
</div>

</div>
</section>

<!-- CABINE -->
<section id="cabine" class="page">
<div id="cabine-layout">

<div id="avatar-box">
<img id="base-avatar">
</div>

<div id="menu-box">
<h3>Studio</h3>
</div>

</div>
</section>

<!-- PANIER -->
<section id="panier" class="page">
<div id="cart">
<h3>Panier</h3>
</div>
</section>

<!-- TAB BAR -->
<div id="tabbar">
  <button onclick="showPage('home')">Home</button>
  <button onclick="showPage('magazine')">Edito</button>
  <button onclick="showPage('cabine')">Studio</button>
  <button onclick="showPage('panier')">Panier</button>
</div>

<script>

function showPage(id){
  document.querySelectorAll(".page")
  .forEach(p=>p.classList.remove("active"));

  document.getElementById(id).classList.add("active");
}

/* accordions */
document.querySelectorAll(".acc-title").forEach(b=>{
  b.onclick=()=>{
    b.parentElement.classList.toggle("active");
  }
});

</script>

</body>
</html>
